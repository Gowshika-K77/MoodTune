# ═══════════════════════════════════════════════════
# nginx.conf — MoodTune Web Server Configuration
# Place at: /etc/nginx/sites-available/moodtune
# Enable: sudo ln -s /etc/nginx/sites-available/moodtune /etc/nginx/sites-enabled/
# ═══════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name moodtune.yourdomain.com;   # ← Change to your domain

    root /var/www/html/moodtune;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # Cache static assets (CSS, JS)
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML — no cache (always fresh)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — redirect all to index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # Logging
    access_log /var/log/nginx/moodtune_access.log;
    error_log  /var/log/nginx/moodtune_error.log;
}

