<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodTune – Your mood. Your music.</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="bgCanvas"></canvas>
  <canvas id="noteCanvas"></canvas>

  <div class="wrap">

    <header>
      <div class="logo">
        <div class="logo-orb">🎵</div>
        <span class="logo-text">MoodTune</span>
      </div>
      <p class="tagline">Your mood. Your music. Every time.</p>
    </header>

    <p class="q">How are you feeling right now?</p>

    <div class="grid">
      <div class="card m-happy"     onclick="pick(this,'happy')">    <span class="emoji">😄</span><span class="label">Happy</span></div>
      <div class="card m-sad"       onclick="pick(this,'sad')">      <span class="emoji">😢</span><span class="label">Sad</span></div>
      <div class="card m-energetic" onclick="pick(this,'energetic')"><span class="emoji">⚡</span><span class="label">Energetic</span></div>
      <div class="card m-calm"      onclick="pick(this,'calm')">     <span class="emoji">🌊</span><span class="label">Calm</span></div>
      <div class="card m-romantic"  onclick="pick(this,'romantic')"> <span class="emoji">❤️</span><span class="label">Romantic</span></div>
      <div class="card m-angry"     onclick="pick(this,'angry')">    <span class="emoji">😤</span><span class="label">Angry</span></div>
      <div class="card m-focused"   onclick="pick(this,'focused')">  <span class="emoji">🎯</span><span class="label">Focused</span></div>
      <div class="card m-nostalgic" onclick="pick(this,'nostalgic')"><span class="emoji">🌅</span><span class="label">Nostalgic</span></div>
    </div>

    <div class="btn-wrap">
      <button class="btn" id="btn" onclick="go()" disabled>
        <span id="bl">✨ Generate My Playlist</span>
        <div class="spin" id="sp"></div>
      </button>
    </div>

    <div id="results"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
